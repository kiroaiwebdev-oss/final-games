<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#070a12" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23070a12'/%3E%3Crect x='9' y='25' width='28' height='17' rx='2' fill='%23eef2fb'/%3E%3Cpath d='M37 29h9l5 6v7H37z' fill='%23ffb422'/%3E%3Ccircle cx='19' cy='46' r='5' fill='%23151a26'/%3E%3Ccircle cx='44' cy='46' r='5' fill='%23151a26'/%3E%3C/svg%3E" />
  <title>Cargo Hauler — Truck Simulator</title>
  <link rel="stylesheet" href="styles.css?v=15" />
</head>
<body>
  <div id="game-root">
    <canvas id="gl"></canvas>
    <div id="vignette"></div>

    <!-- Loading screen -->
    <div id="loading" class="screen">
      <div class="loader-box">
        <div class="logo">CARGO HAULER</div>
        <div class="logo-sub">TRUCK SIMULATOR</div>
        <div class="progress"><div id="progress-bar" class="progress-bar"></div></div>
        <div id="loading-tip" class="tip">Loading...</div>
      </div>
    </div>

    <!-- HUD (in-game overlay) -->
    <div id="hud" class="hidden">
      <div class="hud-top-left">
        <div class="stat money"><span class="ic">$</span><span id="hud-money">0</span></div>
        <div class="stat level">LV <span id="hud-level">1</span>
          <div class="xpbar"><div id="hud-xp" class="xpbar-fill"></div></div>
        </div>
      </div>

      <div class="hud-top-right">
        <div id="hud-clock" class="clock">☀️ 08:00</div>
        <button id="btn-honk" class="icon-btn" title="Horn (H)">📢</button>
        <button id="btn-pause" class="icon-btn">II</button>
      </div>

      <!-- Navigation + objective card (turn-by-turn) -->
      <div class="hud-nav nav-straight" id="hud-nav">
        <div class="nav-arrow" id="nav-arrow"><span id="nav-arrow-ic">↑</span></div>
        <div class="nav-mid">
          <div class="nav-instruction" id="nav-instruction">Go straight</div>
          <div class="nav-objective" id="nav-objective">Getting your first job…</div>
        </div>
        <div class="nav-side">
          <div class="nav-dist" id="nav-dist"></div>
          <div class="nav-timer" id="nav-timer"></div>
        </div>
      </div>

      <canvas id="minimap" class="minimap"></canvas>

      <div class="hud-gauges">
        <div class="gauge">
          <div class="gauge-label">FUEL</div>
          <div class="bar"><div id="fuel-bar" class="bar-fill fuel"></div></div>
        </div>
        <div class="gauge">
          <div class="gauge-label">DAMAGE</div>
          <div class="bar"><div id="damage-bar" class="bar-fill damage"></div></div>
        </div>
      </div>

      <div class="hud-speedo">
        <div id="speed-val" class="speed-val">0</div>
        <div class="speed-unit">km/h</div>
        <div id="gear-val" class="gear-val">D</div>
      </div>

      <!-- Mobile touch controls -->
      <div id="touch-controls" class="hidden">
        <div class="pad pad-left">
          <button class="tbtn steer" data-key="ArrowLeft" aria-label="left">&#8249;</button>
          <button class="tbtn steer" data-key="ArrowRight" aria-label="right">&#8250;</button>
        </div>
        <div class="pad pad-right">
          <button class="tbtn brake" data-key="ArrowDown" aria-label="brake">&#9660;</button>
          <button class="tbtn gas" data-key="ArrowUp" aria-label="gas">&#9650;</button>
        </div>
      </div>
    </div>

    <!-- Toast / popups -->
    <div id="toast" class="toast hidden"></div>

    <!-- Screens (menus) get injected by ui modules -->
    <div id="overlay" class="overlay hidden"></div>
  </div>

  <script type="module" src="src/main.js?v=15"></script>
</body>
</html>
